name: release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-tags: true
      - uses: bazel-contrib/setup-bazel@0.8.5
        with:
          bazelisk-version: 1.x
      - name: validate tag
        run: |
          TAG="${GITHUB_REF_NAME}"
          # Must match vMAJOR.MINOR.PATCH with no pre-release or build suffix
          if ! echo "$TAG" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Error: '$TAG' is not a valid semantic version (expected vMAJOR.MINOR.PATCH)"
            exit 1
          fi
          # Must be greater than the latest existing tag
          PREV=$(git tag --list 'v*' --sort=-version:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | grep -v "^${TAG}$" | head -1)
          if [ -n "$PREV" ]; then
            if ! printf '%s\n%s\n' "$PREV" "$TAG" | sort -V -C; then
              echo "Error: '$TAG' is not greater than the latest release tag '$PREV'"
              exit 1
            fi
          fi
      - name: run tests
        run: bazel test :all
      - name: create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
